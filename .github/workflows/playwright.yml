name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:     # allow manual trigger from GitHub UI

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # Required when secrets are stored under a GitHub Environment (e.g. ".env")
    environment: .env

    # ── All credentials come from GitHub Repository Secrets ─────────────────
    env:
      ADMIN_URL:             ${{ secrets.ADMIN_URL }}
      ADMIN_EMAIL:           ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD:        ${{ secrets.ADMIN_PASSWORD }}
      VENDOR_URL:            ${{ secrets.VENDOR_URL }}
      VENDOR_EMAIL:          ${{ secrets.VENDOR_EMAIL }}
      VENDOR_PASSWORD:       ${{ secrets.VENDOR_PASSWORD }}
      CUSTOMER_URL:          ${{ secrets.CUSTOMER_URL }}
      CUSTOMER_EMAIL:        ${{ secrets.CUSTOMER_EMAIL }}
      CUSTOMER_PASSWORD:     ${{ secrets.CUSTOMER_PASSWORD }}
      DOKAN_CLOUD_URL:       ${{ secrets.DOKAN_CLOUD_URL }}
      DOKAN_CLOUD_EMAIL:     ${{ secrets.DOKAN_CLOUD_EMAIL }}
      DOKAN_CLOUD_PASSWORD:  ${{ secrets.DOKAN_CLOUD_PASSWORD }}

    steps:
      - name: Validate required secrets
        run: |
          required=(
            ADMIN_URL ADMIN_EMAIL ADMIN_PASSWORD
            VENDOR_URL VENDOR_EMAIL VENDOR_PASSWORD
            CUSTOMER_URL CUSTOMER_EMAIL CUSTOMER_PASSWORD
            DOKAN_CLOUD_URL DOKAN_CLOUD_EMAIL DOKAN_CLOUD_PASSWORD
          )
          missing=()
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing GitHub secrets: ${missing[*]}"
            exit 1
          fi

      # ── Checkout & Node setup ────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      # ── Create .auth directory (required before setup projects run) ──────────
      - name: Create .auth directory
        run: mkdir -p playwright/.auth

      # ── Phase 1A: FlyCommerce app admin auth ─────────────────────────────────
      - name: Phase 1A — FlyCommerce auth
        run: npx playwright test --project=setupFlycommerceAuth

      # ── Phase 1B: Marketplace onboarding (creates marketplace admin) ─────────
      - name: Phase 1B — Marketplace onboarding
        run: npx playwright test --project=marketplaceSetup

      # ── Phase 1C: Marketplace admin auth (after marketplace exists) ──────────
      - name: Phase 1C — Marketplace admin auth
        run: npx playwright test --project=setupMarketplaceAdminAuth

      # ── Phase 1D: Marketplace setup guide ─────────────────────────────────────
      - name: Phase 1D — Marketplace setup guide
        run: npx playwright test --project=marketplaceAdminSetupGuide

      # ── Phase 2: Seed data + journey accounts ─────────────────────────────────
      # Creates Brand, Category, Collection, Attribute, journey Vendor + Customer.
      # continue-on-error: entities may already exist on a persistent test environment.
      - name: Phase 2 — Create seed data + journey accounts
        run: npx playwright test --project=adminSeedSetup
        continue-on-error: true

      # ── Phase 3: Vendor + Customer auth ──────────────────────────────────────
      # Saves vendor.json + customer.json (accounts now exist from Phase 2)
      - name: Phase 3 — Vendor + Customer auth
        run: npx playwright test --project=setupAuth

      # ── Phase 4: Vendor journey (product creation) ───────────────────────────
      - name: Phase 4 — Run Vendor Journey
        run: npx playwright test --project=vendorJourney

      # ── Phase 5: Customer checkout journey ────────────────────────────────────
      - name: Phase 5 — Run Customer Journey
        run: npx playwright test --project=customerJourney

      # ── Upload HTML report ────────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
